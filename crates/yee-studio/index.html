<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yee Filter Studio</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1e1e1e;
      }

      /* Fill the viewport so eframe's WebRunner gets the full window. */
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>

    <!--
      Trunk rust directive: build THIS crate's `yee-studio` bin for wasm with
      the `web` feature and `--no-default-features` so the native `desktop`
      (winit/x11/wayland) stack does not leak into the browser bundle. The
      `start_web` entry (#[wasm_bindgen(start)]) mounts onto `the_canvas_id`.
    -->
    <link
      data-trunk
      rel="rust"
      data-bin="yee-studio"
      data-cargo-no-default-features
      data-cargo-features="web"
      data-wasm-opt="2"
    />
  </head>
  <body>
    <canvas id="the_canvas_id"></canvas>
  </body>
</html>
