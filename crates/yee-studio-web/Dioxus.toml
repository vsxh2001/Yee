# Dioxus build config for the yee-studio-web filter studio (App.D.2, ADR-0130).
# `dx build --platform web --release` reads this. The design-system stylesheet
# is bundled via the `asset!` macro in `main.rs`, so no extra web resources are
# listed here.
[application]
name = "yee-studio-web"

[web.app]
title = "Yee Filter Studio"

# App.1.2c (ADR-0135): deployed to GitHub Pages at a `/studio/` subpath of the
# project site, alongside the mdBook docs at root. A GitHub *project* Pages site
# serves under `https://<owner>.github.io/<repo>/` (here `/Yee/`), so the studio
# lives at `/Yee/studio/`. dx 0.6.3 trims surrounding slashes from this value and
# substitutes it for `{base_path}` in the generated index.html, so every emitted
# asset/JS/wasm URL becomes `/Yee/studio/assets/…` — resolving correctly under the
# subpath instead of a bare `/assets/…` that would 404 on the live page. The test
# is the built HTML's URLs (see the pages.yml workflow + ADR-0135).
base_path = "Yee/studio"
