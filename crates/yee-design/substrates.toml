# Yee substrate library — Phase 3.nl.0 (walking skeleton).
#
# Values are single-frequency literals from publicly cited datasheets, kept
# minimal to stay within THIRD_PARTY_LICENSES.md fair-use bounds (spec §10
# TBD on full eps_r(f) curves). Bumping `version` is required whenever any
# row changes; `Provenance.substrate_library_version` records this so a saved
# `intent.json` can detect drift (spec §10 risk #2).

version = "1"

