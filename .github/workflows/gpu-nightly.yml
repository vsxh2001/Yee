# GPU nightly validation.
#
# Currently gated by the repository variable YEE_GPU_RUNNER_ENABLED. To enable:
# 1. Register a self-hosted GitHub Actions runner with a CUDA 12.4+ GPU and the
#    `gpu` label.
# 2. In the repository Settings → Secrets and variables → Actions → Variables,
#    create a variable named YEE_GPU_RUNNER_ENABLED with value "true".
# 3. Optionally set the YEE_GPU_RUNS_ON variable (default: self-hosted-gpu-placeholder)
#    to the actual runs-on label of your runner.
#
# The job is queued nightly at 04:00 UTC and is also manually dispatch-able
# from the Actions tab.

name: GPU nightly

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  gpu-validate:
    name: GPU validation
    if: vars.YEE_GPU_RUNNER_ENABLED == 'true'
    runs-on: ${{ vars.YEE_GPU_RUNS_ON || 'self-hosted-gpu-placeholder' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          components: rustfmt, clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: CUDA Toolkit availability check
        run: nvcc --version

      - name: cargo build (yee-cuda, cuda feature, release)
        run: cargo build -p yee-cuda --features cuda --release

      - name: cargo test (yee-cuda, cuda feature, release, include ignored)
        run: cargo test -p yee-cuda --features cuda --release -- --include-ignored

      # compute-002 (GPU↔CPU FDTD parity) self-skips without a wgpu adapter,
      # so this runner — which has one — is where it actually gates (ADR-0175).
      - name: cargo test (yee-compute, release — wgpu compute parity gate)
        run: cargo test -p yee-compute --release -- --nocapture
