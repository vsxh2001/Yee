name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "ROADMAP.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "ROADMAP.md"
  workflow_dispatch: {}

# Cancel superseded runs on the same ref. PR pushes that arrive while a
# prior run is still in flight will cancel that prior run; pushes to main
# are grouped per-SHA so a true merge train still gets a clean signal.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & test (Rust 1.92, no-default-features)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          components: rustfmt, clippy

      - name: Install system deps (fontconfig for plotters)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check (gate 1)
        run: cargo check --workspace --no-default-features

      - name: cargo fmt --check --all
        run: cargo fmt --check --all

      - name: cargo clippy (workspace, no-default-features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

      - name: cargo test (workspace, no-default-features)
        run: cargo test --workspace --no-default-features

      - name: Upload validation artifacts
        # github.sha is a 40-char hex SHA, not attacker-controlled, so
        # interpolating it directly into the artifact name is safe.
        if: always() # upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ github.sha }}
          path: validation/results/
          if-no-files-found: ignore
          retention-days: 14

      - name: cargo doc (workspace, no-default-features, no-deps)
        run: cargo doc --workspace --no-default-features --no-deps

  wasm-build:
    name: WASM build (yee-studio, --no-default-features)
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          targets: wasm32-unknown-unknown

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Web-readiness gate (App.1.1, ADR-0095): proves the eframe-free
      # `StudioState` flow (+ yee-synth/yee-filter) compiles to WASM with the
      # `desktop` feature off. Guards against a native-only dep leaking in.
      - name: cargo build (yee-studio, wasm32, no-default-features)
        run: cargo build -p yee-studio --no-default-features --target wasm32-unknown-unknown

      # Web bundle gate (App.1.2b, ADR-0107): builds the deployable static
      # bundle (HTML + JS glue + .wasm) for the full `--features web` UI via
      # trunk. jetli/trunk-action also fetches a matching wasm-bindgen-cli, so
      # no separate install step is needed.
      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: "latest"

      - name: trunk build (yee-studio web bundle, release)
        run: trunk build --release crates/yee-studio/index.html

      - name: Upload yee-studio web bundle
        uses: actions/upload-artifact@v4
        with:
          name: yee-studio-web
          path: crates/yee-studio/dist

  python-bindings:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          components: rustfmt, clippy
      - name: Install system deps (fontconfig for plotters)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: create venv + install build deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install maturin pytest numpy
      - name: maturin develop (yee-py)
        working-directory: crates/yee-py
        run: ../../.venv/bin/maturin develop --release
      - name: pytest (yee-py)
        working-directory: crates/yee-py
        run: ../../.venv/bin/pytest tests/ -v
      - name: cargo clippy (yee-py)
        run: cargo clippy -p yee-py --all-targets -- -D warnings

  fdtd-coupling-gate:
    name: FDTD propagation ε_eff gate (fdtd-line-eeff, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: this gate builds only the yee-voxel tree in
    # `--release` and is independent of the workspace lint-test job (whose
    # debug-mode mom-001 solve runs 60-90 min, CLAUDE.md §10). Running it in
    # parallel returns the FDTD verdict in a few minutes instead of serializing
    # behind the slow lint-test.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Filter Phase F1.1b.1 (ADR-0108): the first full-wave EM solve in the
      # filter pipeline. A driven, time-gated PROPAGATION measurement of the
      # microstrip phase velocity → ε_eff (the resonant-split method of PR #1
      # was unworkable — see ADR-0108). The single-line gate
      # `fdtd-line-eeff-001` extracts ε_eff of a straight line; the coupled gate
      # `fdtd-line-eeff-coupled-001` extracts the even/odd ε_eff of a coupled
      # pair. Both are `#[ignore]`'d for default `cargo test` (multi-minute FDTD)
      # and run here in `--release` on a GitHub runner (never on the
      # memory-constrained dev box), asserting ≤ 15 % vs the analytic reference.
      # Mirrors the `mom-001` / gpu-nightly `--release --ignored` release-gate
      # idiom (CLAUDE.md §4: never merge an unrun solver gate).
      - name: fdtd-line-eeff-001 (single line, release, ignored)
        run: cargo test -p yee-voxel --release --test fdtd_line_eeff_001 -- --ignored --nocapture
      - name: fdtd-line-eeff-coupled-001 (coupled even/odd, release, ignored)
        run: cargo test -p yee-voxel --release --test fdtd_line_eeff_coupled_001 -- --ignored --nocapture

  fdtd-lumped-rlc-gate:
    name: FDTD two-way lumped RLC gate (lumped-rlc-twoway-001, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: this gate builds only the yee-fdtd tree in
    # `--release` and is independent of the workspace lint-test job (whose
    # debug-mode mom-001 solve runs 60-90 min, CLAUDE.md §10). Runs in parallel
    # so the FDTD verdict returns in seconds instead of serializing behind it.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Phase 2.fdtd.6.2 (ADR-0116): the stable, two-way semi-implicit lumped
      # series-R-L-C port. `lumped-rlc-twoway-001` asserts (a) stability of a
      # near-lossless reactive load (no NaN; the old ≥196 Ω explicit-C
      # divergence is gone), and (b) two-way correctness — a calibrated
      # pure-resistor shunt reflects with |Γ| matching the analytic
      # −Z₀/(2R+Z₀) law across the band, and a source-free reactive load is
      # not inert. `#[ignore]`'d for default `cargo test` (a few seconds of
      # FDTD) and run here in `--release`. Mirrors the `fdtd-coupling-gate` /
      # `mom-001` `--release --ignored` release-gate idiom (CLAUDE.md §4).
      - name: lumped-rlc-twoway-001 (two-way port, release, ignored)
        run: cargo test -p yee-fdtd --release --test lumped_rlc_twoway_001 -- --ignored --nocapture
      # No-regression guard: the existing one-way lumped gates (fdtd-206 LC
      # ring-down + the resistor energy gate) must stay green under the new
      # builder-gated path.
      - name: lumped no-regression (fdtd-206 + resistor, release)
        run: cargo test -p yee-fdtd --release --test lumped_lc_resonance --test lumped_resistor -- --include-ignored
