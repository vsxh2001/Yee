name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "ROADMAP.md"
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "ROADMAP.md"
  workflow_dispatch: {}

# Cancel superseded runs on the same ref. PR pushes that arrive while a
# prior run is still in flight will cancel that prior run; pushes to main
# are grouped per-SHA so a true merge train still gets a clean signal.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & test (Rust 1.92, no-default-features)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          components: rustfmt, clippy

      - name: Install system deps (fontconfig for plotters)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo check (gate 1)
        run: cargo check --workspace --no-default-features

      - name: cargo fmt --check --all
        run: cargo fmt --check --all

      - name: cargo clippy (workspace, no-default-features)
        run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings

      # `--exclude yee-py`: the PyO3 cdylib bindings fail to compile under
      # workspace-wide `--no-default-features` feature unification (a dep's
      # default-gated API drops out). yee-py is covered by the `python-bindings`
      # job (clippy --all-targets + pytest); it has no Rust unit tests, and its
      # rustdoc examples are non-Rust (python/prose) that rustdoc can't compile
      # (pre-existing, separate from CI green). So the lint-test excludes it.
      - name: cargo test (workspace, no-default-features)
        run: cargo test --workspace --no-default-features --exclude yee-py

      - name: Upload validation artifacts
        # github.sha is a 40-char hex SHA, not attacker-controlled, so
        # interpolating it directly into the artifact name is safe.
        if: always() # upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ github.sha }}
          path: validation/results/
          if-no-files-found: ignore
          retention-days: 14

      - name: cargo doc (workspace, no-default-features, no-deps)
        run: cargo doc --workspace --no-default-features --no-deps

  wasm-build:
    name: WASM build (yee-studio-web, Dioxus)
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # App.D.2 (ADR-0130): the pure-Rust Dioxus studio is now THE studio (the
      # eframe `yee-studio` view was retired). These gates keep it green:
      # fmt + clippy on the crate, then a wasm32 build, then the deployable
      # `dx` bundle.
      - name: cargo fmt --check (yee-studio-web)
        run: cargo fmt --check -p yee-studio-web

      - name: cargo clippy (yee-studio-web, wasm32)
        run: cargo clippy -p yee-studio-web --all-targets --target wasm32-unknown-unknown -- -D warnings

      # Web-readiness gate: proves the Dioxus studio (+ yee-synth / yee-filter /
      # yee-layout / yee-export) compiles to WASM. Guards against a native-only
      # dep leaking into the client-side studio (ADR-0089).
      - name: cargo build (yee-studio-web, wasm32)
        run: cargo build -p yee-studio-web --target wasm32-unknown-unknown

      # Web bundle gate: builds the deployable static bundle (HTML + JS glue +
      # fingerprinted .wasm + CSS) via the Dioxus CLI `dx`, mirroring the local
      # `dx build --platform web --release` flow.
      - name: Install Dioxus CLI (dx 0.6.3)
        run: cargo install dioxus-cli --version 0.6.3 --locked

      - name: dx build (yee-studio-web web bundle, release)
        working-directory: crates/yee-studio-web
        run: dx build --platform web --release

      - name: Upload yee-studio-web bundle
        uses: actions/upload-artifact@v4
        with:
          name: yee-studio-web
          path: target/dx/yee-studio-web/release/web/public

  python-bindings:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          components: rustfmt, clippy
      - name: Install system deps (fontconfig for plotters)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: create venv + install build deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install maturin pytest numpy
      - name: maturin develop (yee-py)
        working-directory: crates/yee-py
        run: ../../.venv/bin/maturin develop --release
      - name: pytest (yee-py)
        working-directory: crates/yee-py
        run: ../../.venv/bin/pytest tests/ -v
      - name: cargo clippy (yee-py)
        run: cargo clippy -p yee-py --all-targets -- -D warnings

  studio-build:
    name: Studio build (Tauri 2 + React, vitest DOM gates)
    runs-on: ubuntu-latest
    # S.2/S.3 gate (ADR-0179/0180): typecheck + vite build + vitest DOM
    # smoke tests for the frontend, and a cargo check of the Tauri shell
    # against the real webkit2gtk stack. studio/src-tauri is intentionally
    # outside the root cargo workspace, so this is its only CI coverage.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Install Tauri system deps (webkit2gtk)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: studio/src-tauri

      - name: npm install
        working-directory: studio
        run: npm install

      - name: Frontend typecheck + build
        working-directory: studio
        run: npm run build

      - name: Frontend DOM gates (vitest)
        working-directory: studio
        run: npm test

      - name: Tauri shell cargo check
        working-directory: studio/src-tauri
        run: cargo check

      # R.5 (ADR-0198): the scripted design flow at the command layer —
      # spec -> synthesis -> dims -> layout -> coupling-matrix response,
      # with the .s2p and Gerber artifacts byte-checked against yee-io /
      # yee-export (gate studio-design-e2e-001).
      - name: Studio design-flow e2e (byte-checked exports)
        working-directory: studio/src-tauri
        run: cargo test --test design_e2e

      # R.5b (ADR-0199): the full-wave verify PIPE at reduced fidelity —
      # phase-ordered progress streaming and the exact-identity |S21| = 0 dB
      # case (two bit-identical solves); physics is gated in yee-engine /
      # yee-filter (gate studio-verify-e2e-001, ~1-2 min debug).
      - name: Studio verify-flow e2e (pipe, reduced fidelity)
        working-directory: studio/src-tauri
        run: cargo test --test verify_e2e

      # R.5c (ADR-0203): the antenna panel — Balanis dims + byte-checked
      # Gerbers (instant) and the reduced-fidelity verify pipe (gate
      # studio-antenna-e2e-001, ~1 min debug).
      - name: Studio antenna-flow e2e (design + pipe)
        working-directory: studio/src-tauri
        run: cargo test --test antenna_e2e

  compute-engine-gates:
    name: Compute engine gates (yee-compute + yee-engine, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test` — same rationale as fdtd-coupling-gate. Runs the
    # `#[ignore]`'d yee-compute gates (ADR-0175..0177): compute-006 cavity
    # TE101 vs the analytic Pozar frequency, compute-008 line-eeff vs
    # Hammerstad-Jensen on the engine, compute-009 FP32 drift, compute-010
    # NTFF dipole vs the analytic sin θ pattern. GPU-dependent gates
    # self-skip on the GPU-less runner and bite on the GPU nightly instead;
    # the fast non-ignored gates (compute-001..005, 007) already run in the
    # workspace lint-test job. Also runs the yee-engine S.5 gate
    # engine-verify-001 (ADR-0182): the same line-eeff scenario expressed as
    # a JobSpec and run through the submit()/JobEvent job protocol.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: yee-compute gates (release, include-ignored)
        run: cargo test -p yee-compute --release -- --include-ignored --nocapture

      # The antenna gates (A.0..A.3) run in their own parallel job below —
      # skipping them here keeps this job's wall time bounded. This blanket
      # include-ignored run covers the board-physics gates too: engine-loss-001
      # + engine-via-001 (R.0/R.1, ADR-0194) and engine-sparams-002 (R.2,
      # ADR-0195: complex transfer phase vs HJ + passivity-enforced .s2p
      # round-trip).
      - name: yee-engine gates incl. engine-verify-001 (release, include-ignored)
        run: cargo test -p yee-engine --release -- --include-ignored --nocapture --skip antenna_ --skip patch_ --skip inset_ --skip design_loop_

      # F1.3.0/S.8 (ADR-0185): the first synthesized-filter-vs-its-design
      # full-wave verify — N=5 Butterworth stepped-impedance LPF through the
      # job protocol, cutoff/passband/stopband held against the closed-form
      # design targets.
      - name: engine-filter-verify-001 (yee-filter, release, ignored)
        run: cargo test -p yee-filter --release --test engine_lpf_verify -- --ignored --nocapture

      # F1.2.1.0/S.11-S.12 (ADR-0188/0189): the closed design loop —
      # synthesize -> engine-verify -> secant-correct the synthesis f_c ->
      # repeat, on the DIRECTIONAL (3-probe standing-wave) |S21| observable.
      # Converges 27% seed error -> 1.0% in four map points (~8 release
      # solves, ~19 min).
      - name: engine-refine-001 (yee-filter, release, ignored)
        run: cargo test -p yee-filter --release --test engine_lpf_refine -- --ignored --nocapture

  bpf-bo-gate:
    name: BPF BO gate (engine-bpf-bo-001, R.4, release)
    runs-on: ubuntu-latest
    # No `needs:` — parallel with the other release gates. The F1.2.1
    # EM-in-the-loop BO machinery gate (ADR-0197): 1 reference + 12
    # BO-driven full-wave solves (~35-40 min); asserts BO improves the
    # seed misfit by >= 2 dB RMS on a live measurement. The fine-grid
    # passband close-out is R.4c on the GPU nightly.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: engine-bpf-bo-001 (yee-filter, release, ignored)
        run: cargo test -p yee-filter --release --test engine_bpf_bo -- --ignored --nocapture

  antenna-gates:
    name: Antenna design gates (A.0-A.3, release)
    runs-on: ubuntu-latest
    # No `needs:` — parallel with the other release gates. Runs the antenna
    # track (ADR-0190..0193): A.0 resonance (engine-antenna-001), A.1 inset +
    # directional S11 (engine-antenna-002), A.2 far-field pattern
    # (engine-antenna-003), A.3 inset design loop (engine-antenna-004,
    # ~5 solves). Total ~45 min of release FDTD.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: A.0 patch resonance (engine-antenna-001)
        run: cargo test -p yee-engine --release --test antenna_patch_s11 -- --ignored --nocapture

      - name: A.1 inset + directional S11 (engine-antenna-002)
        run: cargo test -p yee-engine --release --test antenna_patch_inset -- --ignored --nocapture

      - name: A.2 far-field pattern (engine-antenna-003)
        run: cargo test -p yee-engine --release --test antenna_patch_pattern -- --ignored --nocapture

      - name: A.3 inset design loop (engine-antenna-004)
        run: cargo test -p yee-engine --release --test antenna_patch_match_loop -- --ignored --nocapture

      # FS.1a (ADR-0205): the quasi-Yagi on the lifted truncated-ground
      # stack (engine-antenna-005, one ~4 min release solve).
      - name: FS.1a quasi-Yagi (engine-antenna-005)
        run: cargo test -p yee-engine --release --test antenna_quasi_yagi -- --ignored --nocapture

      # FS.1a.2 (ADR-0205): the end-fire pattern + F/B gate
      # (engine-antenna-006, one ~9 min release solve with per-step NTFF).
      - name: FS.1a.2 quasi-Yagi pattern (engine-antenna-006)
        run: cargo test -p yee-engine --release --test antenna_quasi_yagi_pattern -- --ignored --nocapture

      # FS.1b (ADR-0206): the 2x1 corporate-fed array - S11 (~5 min) and
      # the pattern-multiplication cut (~15 min with per-step NTFF).
      - name: FS.1b.1 patch array S11 (engine-antenna-007)
        run: cargo test -p yee-engine --release --test antenna_patch_array -- --ignored --nocapture

      - name: FS.1b.2 patch array pattern (engine-antenna-008)
        run: cargo test -p yee-engine --release --test antenna_patch_array_pattern -- --ignored --nocapture

      # FS.2b (ADR-0207): absolute gain in dBi on the finite-board
      # fixture (engine-gain-001, 2 solves + NTFF, ~22 min).
      - name: FS.2b gain in dBi (engine-gain-001)
        run: cargo test -p yee-engine --release --test antenna_gain -- --ignored --nocapture

      # FS.2c (ADR-0207): radiation efficiency + full-sphere export
      # (engine-eff-001, 2 solves + 192-direction NTFF, ~16 min).
      - name: FS.2c efficiency (engine-eff-001)
        run: cargo test -p yee-engine --release --test antenna_efficiency -- --ignored --nocapture

  fdtd-coupling-gate:
    name: FDTD propagation ε_eff gate (fdtd-line-eeff, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: this gate builds only the yee-voxel tree in
    # `--release` and is independent of the workspace lint-test job (whose
    # debug-mode mom-001 solve runs 60-90 min, CLAUDE.md §10). Running it in
    # parallel returns the FDTD verdict in a few minutes instead of serializing
    # behind the slow lint-test.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Filter Phase F1.1b.1 (ADR-0108): the first full-wave EM solve in the
      # filter pipeline. A driven, time-gated PROPAGATION measurement of the
      # microstrip phase velocity → ε_eff (the resonant-split method of PR #1
      # was unworkable — see ADR-0108). The single-line gate
      # `fdtd-line-eeff-001` extracts ε_eff of a straight line; the coupled gate
      # `fdtd-line-eeff-coupled-001` extracts the even/odd ε_eff of a coupled
      # pair. Both are `#[ignore]`'d for default `cargo test` (multi-minute FDTD)
      # and run here in `--release` on a GitHub runner (never on the
      # memory-constrained dev box), asserting ≤ 15 % vs the analytic reference.
      # Mirrors the `mom-001` / gpu-nightly `--release --ignored` release-gate
      # idiom (CLAUDE.md §4: never merge an unrun solver gate).
      - name: fdtd-line-eeff-001 (single line, release, ignored)
        run: cargo test -p yee-voxel --release --test fdtd_line_eeff_001 -- --ignored --nocapture
      - name: fdtd-line-eeff-coupled-001 (coupled even/odd, release, ignored)
        run: cargo test -p yee-voxel --release --test fdtd_line_eeff_coupled_001 -- --ignored --nocapture

  fdtd-lumped-rlc-gate:
    name: FDTD two-way lumped RLC gate (lumped-rlc-twoway-001, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: this gate builds only the yee-fdtd tree in
    # `--release` and is independent of the workspace lint-test job (whose
    # debug-mode mom-001 solve runs 60-90 min, CLAUDE.md §10). Runs in parallel
    # so the FDTD verdict returns in seconds instead of serializing behind it.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Phase 2.fdtd.6.2 (ADR-0116): the stable, two-way semi-implicit lumped
      # series-R-L-C port. `lumped-rlc-twoway-001` asserts (a) stability of a
      # near-lossless reactive load (no NaN; the old ≥196 Ω explicit-C
      # divergence is gone), and (b) two-way correctness — a calibrated
      # pure-resistor shunt reflects with |Γ| matching the analytic
      # −Z₀/(2R+Z₀) law across the band, and a source-free reactive load is
      # not inert. `#[ignore]`'d for default `cargo test` (a few seconds of
      # FDTD) and run here in `--release`. Mirrors the `fdtd-coupling-gate` /
      # `mom-001` `--release --ignored` release-gate idiom (CLAUDE.md §4).
      - name: lumped-rlc-twoway-001 (two-way port, release, ignored)
        run: cargo test -p yee-fdtd --release --test lumped_rlc_twoway_001 -- --ignored --nocapture
      # No-regression guard: the existing one-way lumped gates (fdtd-206 LC
      # ring-down + the resistor energy gate) must stay green under the new
      # builder-gated path.
      - name: lumped no-regression (fdtd-206 + resistor, release)
        run: cargo test -p yee-fdtd --release --test lumped_lc_resonance --test lumped_resistor -- --include-ignored

  fdtd-lumped-gate:
    name: FDTD lumped-LC EM gate (fdtd-lumped-001, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: like fdtd-coupling-gate, this builds only the
    # yee-voxel tree in `--release` and is independent of the slow workspace
    # lint-test job; running it in parallel returns the FDTD verdict in a few
    # minutes (CLAUDE.md §10).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Filter Phase F2.3 (ADR-0115 → re-scoped F2.3-i, ADR-0134): full-wave FDTD
      # EM simulation of a synthesized lumped-LC filter board
      # (yee_voxel::simulate_lumped_board — aperture lumped ports + CW + PEC-box
      # 2-point de-embed). The `#[ignore]`'d gate asserts the EM-sim pipeline runs
      # end-to-end AND the synthesized components demonstrably LOAD the line
      # (≥ 6 dB deviation + spread vs the bare thru; an in-test inert control
      # proves non-vacuity — an inert/flat response fails). The SHARP band-pass
      # shape is NOT asserted here: it is a documented fundamental FDTD-measurement
      # wall (ADR-0133 — a high-Q microstrip filter's CW steady-state S21 in a
      # stable PEC box is cavity-dominated), and is cross-validated at the circuit
      # level by ladder_s21 vs Pozar (lumped_001, ADR-0111) + the per-element
      # reactance by aperture_port_001 / cap_cw_001 (ADR-0125/0127). Mirrors the
      # fdtd-line-eeff / mom-001 `--release --ignored` release-gate idiom
      # (CLAUDE.md §4: never merge an unrun solver gate).
      - name: fdtd-lumped-001 (lumped-LC EM, release, ignored)
        run: cargo test -p yee-voxel --release --test fdtd_lumped_001 -- --ignored --nocapture

  fdtd-reactive-deembed-gate:
    name: FDTD reactive V+I de-embed bench (reactive-deembed-001, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: builds only the yee-fdtd tree in `--release`, in
    # parallel with the other FDTD release gates (CLAUDE.md §10).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Phase 2.fdtd.6.5 (ADR-0119): a VNA-style V+I 1-port de-embedding bench
      # for the canonical two-way lumped port. The gate ASSERTS the
      # κ-proportionality resistor anchor (the de-embed recovers a real,
      # frequency-flat, R-linear impedance — the bench is honest by
      # construction) and PINS the recorded reactive verdict (`PORT-WRONG`: the
      # de-embedded reactive Z_L does not match R+jωL+1/(jωC) — see the test's
      # Outcome docstring). `#[ignore]`'d for default `cargo test` (~1 s of
      # FDTD in release) and run here. Mirrors the `fdtd-lumped-rlc-gate` /
      # `mom-001` `--release --ignored` release-gate idiom (CLAUDE.md §4).
      - name: reactive-deembed-001 (V+I de-embed bench, release, ignored)
        run: cargo test -p yee-fdtd --release --test reactive_deembed_001 reactive_deembed_001 -- --ignored --nocapture

  fdtd-per-axis-cpml-gate:
    name: FDTD per-axis CPML gate (cpml-per-axis-001, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: builds only the yee-fdtd tree in `--release`, in
    # parallel with the other FDTD release gates (CLAUDE.md §10).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Phase 2.fdtd.6.7 (ADR-0122): per-axis CPML face selection. The gate
      # drives an x-travelling pulse down a guide with x-only CPML (both
      # x-ends) and PEC on the transverse (y, z) walls, and asserts (a) the
      # x-end reflection is ≥30 dB below an all-PEC control (the same target
      # as the all-faces `cpml_reflection` gate) and (b) the transverse PEC
      # walls stay intact (tangential E ≈ 0) so the guide mode is preserved,
      # not absorbed. `#[ignore]`'d for default `cargo test` (a few seconds of
      # FDTD in release) and run here. Mirrors the `fdtd-lumped-rlc-gate` /
      # `mom-001` `--release --ignored` release-gate idiom (CLAUDE.md §4).
      - name: cpml-per-axis-001 (x-only CPML + transverse PEC, release, ignored)
        run: cargo test -p yee-fdtd --release --test cpml_per_axis_001 -- --ignored --nocapture
      # No-regression guard: the existing all-six-faces CPML gate must stay
      # green under the new default axis mask (`[true; 3]` is byte-identical).
      - name: cpml-reflection no-regression (all faces, release)
        run: cargo test -p yee-fdtd --release --test cpml_reflection -- --include-ignored

  fdtd-aperture-port-gate:
    name: FDTD aperture-port dx-stability gate (aperture-port-001, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: builds only the yee-fdtd tree in `--release`, in
    # parallel with the other FDTD release gates (CLAUDE.md §10).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Phase 2.fdtd.6.9 (ADR-0125): multi-cell APERTURE lumped port. The gate
      # de-embeds pure-L / pure-C / series-RLC aperture ports on a parallel-plate
      # guide at TWO dx (1.0 & 0.5 mm — a 2× refinement, physical geometry held
      # fixed) and asserts
      # (a) the resistor anchor de-embeds to Z_L ≈ R (honest, never weakened),
      # (b) the reactive Z_L(ω) is within a loose tol of R+jωL+1/(jωC), and
      # (c) the DECISIVE dx-STABILITY check — the reactive Z_L at the two dx agree
      # within a loose tol, i.e. the O(dx²) single-cell reactance collapse
      # (ADR-0124) is GONE. Reuses the trustworthy `reactive_deembed_001`
      # PEC-source de-embed harness (NOT the matched-line bench, ADR-0123).
      # `#[ignore]`'d for default `cargo test` (a few minutes of FDTD in release)
      # and run here. Mirrors the `fdtd-per-axis-cpml-gate` release-gate idiom
      # (CLAUDE.md §4).
      - name: aperture-port-001 (dx-stability, release, ignored)
        run: cargo test -p yee-fdtd --release --test aperture_port_001 -- --ignored --nocapture
      # No-regression guard: the single-edge two-way port + the resistor-exact
      # path must stay green under the additive aperture API.
      - name: reactive-deembed no-regression (single-edge port, release)
        run: cargo test -p yee-fdtd --release --test reactive_deembed_001 -- --include-ignored
      - name: lumped-rlc-twoway no-regression (single-edge two-way, release)
        run: cargo test -p yee-fdtd --release --test lumped_rlc_twoway_001 -- --include-ignored

  mom-dipole-gate:
    name: MoM dipole gate (mom-001, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: builds only the yee-mom tree in `--release`, in
    # parallel with the other release gates. The mom-001 finite-radius
    # half-wave dipole solve (24×176 cylinder) runs ~7-8 min in `--release`
    # but 60-90 min in debug (CLAUDE.md §10), so the dipole tests are
    # `#[ignore]`'d for the default debug `cargo test --workspace` (which was
    # timing out the lint-test job). This gate runs `dipole_z_at_resonance` in
    # release — the NEC-4 finite-radius reference Z ≈ 87 + j41 Ω (±5 % Re /
    # ±10 % Im). Mirrors the FDTD release-gate idiom (CLAUDE.md §4: never merge
    # an unrun solver gate).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # Name-filter to `dipole_z_at_resonance` (the NEC-4 assertion). A bare
      # `-- --ignored` would ALSO run the manual `dipole_z_diagnostics` 6-mesh
      # sweep and the pre-existing `dipole_full_sweep` 21-point sweep (hours,
      # even in release) — neither asserts the gate, so the filter keeps this
      # job to the ~7-8 min assertion run.
      - name: mom-001 dipole (NEC-4 87+j41 Ω, release, ignored)
        run: cargo test -p yee-mom --release --test dipole -- --ignored dipole_z_at_resonance --nocapture

  fem-eigen-gate:
    name: FEM eigen gates (fem-eig-001/003, release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: builds only the yee-validation tree in `--release`,
    # in parallel with the other release gates. These FEM gates are
    # `#[ignore]`'d for the default debug `cargo test --workspace` (CLAUDE.md
    # §10): fem-eig-001 re-runs a 9720-tet LOBPCG eigensolve per test (~12 s
    # debug × 4), and EVERY fem-eig-003 test re-runs the same ~72k-tet sparse-LU
    # 50-pt sweep (~764 s debug, 7.4 GB RSS) — left non-ignored they timed out
    # the workspace lint-test job. This gate runs them in `--release`. Mirrors
    # the `mom-001` / FDTD `--release --ignored` release-gate idiom (CLAUDE.md
    # §4: never merge an unrun solver gate).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      # yee-validation pulls plotters -> yeslogic-fontconfig-sys, whose build
      # script needs libfontconfig1-dev (without it the gate fails to BUILD,
      # not on a test assertion). The lint-test + python-bindings jobs already
      # install this; the FDTD gates don't (yee-fdtd/voxel don't pull plotters).
      - name: Install system deps (fontconfig for plotters)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config

      # fem-eig-001 is fast in release (the four 9720-tet LOBPCG asserts run in
      # well under a minute total), so `--ignored` runs all four cavity gates.
      - name: fem-eig-001 rectangular cavity (Pozar TE101, release, ignored)
        run: cargo test -p yee-validation --release --test fem_eig_001_rectangular_cavity -- --ignored --nocapture

      # fem-eig-003: all five tests re-run the SAME ~72k-tet sparse-LU 50-pt
      # sweep. A single solve measured ~458 s in `--release` and allocates
      # ~7.4 GB RSS. `--test-threads=1` is MANDATORY: libtest runs a binary's
      # tests in parallel by default, and five concurrent ~7.4 GB solves
      # (~37 GB peak) OOM-kill both the bounded dev box (12g) and the
      # ~16 GB GitHub `ubuntu-latest` runner (verified: bare `--include-ignored`
      # SIGKILL'd in 38 s). Serialized, peak RSS is ~7.4 GB (fits) and the five
      # solves run in ≈ 38 min — within the gate's time budget — exercising
      # maximal coverage: driver smoke, gate (B) passive, gate (C) smoothness,
      # plus the two strict continuum-limit gates (strict-passive `|S11| < 1`
      # and the CFS-PML absorption floor). The v3.5.2 PML retune
      # (PmlConfig::default = κ=2, m=3, thickness_cells=16, α_grading_order=1)
      # drives the band to ≈ [-71.5, -55.6] dB / |S11| ≈ 1e-3, so all five pass
      # (measured in this PR's release verification).
      - name: fem-eig-003 WR-90 stub CFS-PML sweep (release, all ignored, serial)
        run: cargo test -p yee-validation --release --test fem_eig_003_wr90_stub_abc -- --include-ignored --test-threads=1 --nocapture

      # FEM-EM brick B4 (ADR-0153): straight-microstrip ε_eff driven-sweep
      # gate. Two driven sparse-LU solves on a ≲14k-tet FR-4 line; recovers
      # ε_eff to 0.61 % of Hammerstad-Jensen via the wrap-free two-length
      # phase method. `#[ignore]`'d (CLAUDE.md §10) so the default debug
      # `cargo test --workspace` never runs it; run here in `--release`. The
      # NAME FILTER is deliberate — only the gate runs in CI; the three
      # forensic probes (`_experiments`, `_convergence`, `_noncircular`) are
      # explicit-only and would add minutes for no CI signal.
      - name: mom microstrip eps_eff (fem-line-eeff-001, release, ignored)
        run: cargo test -p yee-fem --release --test microstrip_eeff -- --ignored fem_line_eeff_001 --nocapture

      # FEM-EM brick K1 (ADR-0155): coupled-microstrip resonator-pair coupling
      # `k` gate. One driven sparse-LU sweep (~61 pts) on a ~63k-tet FR-4
      # coupled pair; asserts two resolvable transmission peaks (valley ≥ 6 dB
      # below the shallower peak — a re-smearing tripwire) AND |k_fem − k_eps| /
      # k_eps ≤ 0.30 vs the like-for-like ε_eff-split (ADR-0155 K2 finding;
      # k_imp `coupling_coefficient` reported for traceability).
      # `#[ignore]`'d (CLAUDE.md §10) so the default debug `cargo test
      # --workspace` never runs it; run here in `--release`. Multi-minute (the
      # de-risk probe measured ~280 s); fits the GitHub runner (the long-thin
      # box keeps the per-ω faer sparse-LU bandwidth low).
      - name: fem coupled-resonator k (fem-coupling-001, release, ignored)
        run: cargo test -p yee-fem --release --test fem_coupling_001 -- --ignored --nocapture

      # FEM-EM brick K2 (ADR-0155): k-vs-gap MONOTONICITY — strengthens the K1
      # single point into a curve. THREE driven sweeps at S = 1.5 / 2.0 / 3.0 mm
      # (61 / 61 / 91 pts; the widest gap gets the finest step for its narrower
      # split); asserts every gap resolves two peaks, `k_fem` is strictly
      # monotone-decreasing in the gap, and each gap is within 30 % of the
      # like-for-like ε_eff-split `k_eps(S)` (ADR-0155 K2 finding). `#[ignore]`'d
      # so the default debug `cargo test
      # --workspace` never runs it; run here in `--release`. ~16 min (three K1-
      # sized sweeps); fits the GitHub runner (the long-thin box keeps the per-ω
      # faer sparse-LU bandwidth low).
      - name: fem coupled-resonator k vs gap (fem-coupling-002, release, ignored)
        run: cargo test -p yee-fem --release --test fem_coupling_002 -- --ignored --nocapture

      # F1.2.1.1 brick B1 (ADR-0159): FEM-k per-gap coupling design-curve
      # CORRECTOR. Bisects the gap onto the FEM-measured K(gap) curve until the
      # realized resonant-split coupling hits a synthesis target (k_target =
      # 0.040), fixing the impedance-k-vs-resonant-k divergence (k_imp ≠ k_eps;
      # ADR-0155 K2) that floors the 3-pole filter S21 at ~−27 dB. Asserts the
      # root-find converged within 8 % of the target inside a 6-eval budget on the
      # [1.0,4.0] mm bracket, and that the corrected gap moved a real margin off
      # the deliberately-mis-dimensioned 2.0 mm seed (~20 % off). `#[ignore]`'d so
      # the default debug `cargo test --workspace` never runs it; run here in
      # `--release`. ~25 min (one K1-sized driven sweep per bisection eval, ~5-6
      # evals); fits the GitHub runner (the long-thin coupled-pair box keeps the
      # per-ω faer sparse-LU bandwidth low).
      - name: fem coupling gap corrector (fem-coupling-correct-001, release, ignored)
        run: cargo test -p yee-fem --release --test fem_coupling_correct_001 -- --ignored --nocapture

      # F1.2.1.0 (ADR-0157): single-gap surrogate-BO EM-in-loop dimensional
      # refinement — the design engine's walking skeleton. A 1-D Bayesian
      # optimizer (`yee_surrogate::minimize`, EI/GP) drives the FEM resonant-
      # split coupling-k (`yee_fem::coupled_resonator_k`) from an off-target
      # seed gap (2.0 mm, k_fem ≈ 0.0481 → ~20 % off TARGET_K = 0.040) to the
      # target, closing the ~17–26 % impedance-vs-resonant divergence the
      # analytic dimensioner cannot. HEAVY: the BO closure calls one FEM driven
      # sweep per eval — 12 sequential evals + 2 confirmation evals ≈ 57 min in
      # `--release` (each sweep is multi-minute, like fem-coupling-001).
      # `#[ignore]`'d so the default debug `cargo test --workspace` never runs
      # it; run here in `--release` (the long-thin coupled-pair box keeps the
      # per-ω faer sparse-LU bandwidth low, so it fits the GitHub runner).
      - name: bo coupled-resonator gap refine (bo-coupling-001, release, ignored)
        run: cargo test -p yee-validation --release --test bo_coupling_001 -- --ignored --nocapture

  fdtd-heavy-validation-gate:
    name: FDTD heavy validation gates (release)
    runs-on: ubuntu-latest
    # No `needs: lint-test`: builds only the yee-fdtd tree in `--release`, in
    # parallel with the other release gates. These three integration tests are
    # `#[ignore]`'d for the default debug `cargo test --workspace` (CLAUDE.md
    # §10) because each runs a multi-hundred-step FDTD solve that is far too
    # slow in debug (percell_eps_r ~360 s, ntff ~83 s, subgrid ~30 s debug) and
    # was timing out the workspace lint-test job. `--include-ignored` runs each
    # file's ignored heavy test plus any always-on smoke (e.g. the subgrid
    # 0.4 s short-window smoke). Mirrors the `mom-001` / FDTD `--release
    # --ignored` release-gate idiom (CLAUDE.md §4: never merge an unrun gate).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: heterogeneous-substrate + ntff-dipole + subgrid-traversal (release, ignored)
        run: cargo test -p yee-fdtd --release --test heterogeneous_substrate --test ntff_dipole --test subgrid_plane_wave_traversal -- --include-ignored --nocapture
