# Wheel publish workflow.
#
# Currently builds and uploads as a workflow artifact for download.
# To enable real PyPI publishing:
# 1. Create a PyPI account + project + scoped API token.
# 2. In the repository Settings → Secrets and variables → Actions → Secrets,
#    create PYPI_API_TOKEN.
# 3. Uncomment the publish step at the bottom of this file.
# 4. Push a tag matching phase-1-frontend-* or release-*.

name: Publish wheels

on:
  push:
    tags:
      - "phase-1-frontend-*"
      - "release-*"

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]   # macOS / Windows can be added later
        target: [x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --strip --manifest-path crates/yee-py/Cargo.toml
          target: ${{ matrix.target }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: yee-py-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: target/wheels/*.whl

      # To enable real PyPI publishing, uncomment the following step and ensure
      # the PYPI_API_TOKEN secret is configured in repository settings.
      #
      # - name: Publish to PyPI
      #   uses: PyO3/maturin-action@v1
      #   with:
      #     command: upload
      #     args: --non-interactive --skip-existing target/wheels/*.whl
      #   env:
      #     MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
