# Weekly heavy release gates: full multi-pass convergence runs that are
# too slow for per-PR CI (the per-PR jobs cover the same subsystems with
# single-pass gates — engine-graded-001, engine-automesh-001).
#
# Runs Sunday 04:00 UTC + on demand (workflow_dispatch).

name: heavy-weekly

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  graded-convergence-gate:
    name: Graded convergence gate (engine-automesh-002, FS.0b.2b, release)
    runs-on: ubuntu-latest
    timeout-minutes: 350
    # ADR-0216: converge_two_port_graded on the S.6 stub board — 3 passes
    # x 2 solves (finest 9.9 M cells, 20k steps): ~90 min on a fast local
    # box, budgeted generously for hosted runners.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: engine-automesh-002 (yee-engine, release, ignored)
        run: cargo test -p yee-engine --release --test automesh_graded -- --ignored --nocapture

  fem-refinement-loops:
    name: FEM refinement-loop gates (coupling-correct-001 + bo-coupling-001, release)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    # Moved from per-PR ci.yml (2026-07-14): these two are refinement LOOPS
    # over multi-minute FEM driven sweeps (~1 h + ~1.5 h hosted) and pushed
    # the combined FEM job past the 6-hour workflow hard limit (run 369).
    # Per-PR coverage of the same subsystems stays with fem-coupling-001/002.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"

      - name: Cache cargo build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install system deps (fontconfig for plotters)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev pkg-config

      # F1.2.1.1 brick B1 (ADR-0159): FEM-k per-gap coupling design-curve
      # CORRECTOR. Bisects the gap onto the FEM-measured K(gap) curve until the
      # realized resonant-split coupling hits a synthesis target (k_target =
      # 0.040), fixing the impedance-k-vs-resonant-k divergence (k_imp ≠ k_eps;
      # ADR-0155 K2) that floors the 3-pole filter S21 at ~−27 dB. Asserts the
      # root-find converged within 8 % of the target inside a 6-eval budget on the
      # [1.0,4.0] mm bracket, and that the corrected gap moved a real margin off
      # the deliberately-mis-dimensioned 2.0 mm seed (~20 % off). `#[ignore]`'d so
      # the default debug `cargo test --workspace` never runs it; run here in
      # `--release`. ~25 min (one K1-sized driven sweep per bisection eval, ~5-6
      # evals); fits the GitHub runner (the long-thin coupled-pair box keeps the
      # per-ω faer sparse-LU bandwidth low).
      - name: fem coupling gap corrector (fem-coupling-correct-001, release, ignored)
        run: cargo test -p yee-fem --release --test fem_coupling_correct_001 -- --ignored --nocapture

      # F1.2.1.0 (ADR-0157): single-gap surrogate-BO EM-in-loop dimensional
      # refinement — the design engine's walking skeleton. A 1-D Bayesian
      # optimizer (`yee_surrogate::minimize`, EI/GP) drives the FEM resonant-
      # split coupling-k (`yee_fem::coupled_resonator_k`) from an off-target
      # seed gap (2.0 mm, k_fem ≈ 0.0481 → ~20 % off TARGET_K = 0.040) to the
      # target, closing the ~17–26 % impedance-vs-resonant divergence the
      # analytic dimensioner cannot. HEAVY: the BO closure calls one FEM driven
      # sweep per eval — 12 sequential evals + 2 confirmation evals ≈ 57 min in
      # `--release` (each sweep is multi-minute, like fem-coupling-001).
      # `#[ignore]`'d so the default debug `cargo test --workspace` never runs
      # it; run here in `--release` (the long-thin coupled-pair box keeps the
      # per-ω faer sparse-LU bandwidth low, so it fits the GitHub runner).
      - name: bo coupled-resonator gap refine (bo-coupling-001, release, ignored)
        run: cargo test -p yee-validation --release --test bo_coupling_001 -- --ignored --nocapture
